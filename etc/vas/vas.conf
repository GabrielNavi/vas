# Configuración del servidor VAS
# Nota: Puedes añadir sobreescrituras en /etc/vas/vas.conf.d/*.conf
# (se aplican en orden lexical, después de este archivo).

# Puerto en el que escucha el servidor FastAPI/Uvicorn
PORT=8000

# Ruta a la base de datos SQLite
DB_PATH=/var/lib/vas/vas.db

# Tiempo de vida en días de los clientes registrados.
# Tras este tiempo sin actividad el cliente se elimina en el próximo arranque.
# Debe ser notablemente mayor que CHECK_SECONDS de los clientes VAC.
# Con CHECK_SECONDS=300 (5 min), cualquier valor > 1 día es seguro.
CLIENT_TTL_DAYS=30
