# Configuración del servidor VAS

# Puerto en el que escucha el servidor FastAPI/Uvicorn
PORT=8000

# Ruta a la base de datos SQLite
DB_PATH=/var/lib/vas/vas.db

# Ruta al fichero JSON generado para Veyon
CONFIG_PATH=/var/lib/vas/computers.json

# Habilita la sincronizacion automatica de networkobjects en Veyon Master (1/0)
VEYON_MASTER_SYNC=1

# Location administrada por VAS dentro de Veyon Master
VEYON_LOCATION=Autoregistrados

# CSV temporal usado para importar networkobjects en Veyon Master
VEYON_CSV_PATH=/var/lib/vas/computers-master.csv
