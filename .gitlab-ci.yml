variables:
  _USER: "builduser"
  _PATH: /home/$_USER/$CI_PROJECT_NAME
  _DEPLOY: "test-gabriel"
  DEBIAN_FRONTEND: noninteractive

stages:
  - build
  - upload
  - deployment

build-vitalinux3x:
  image: vitalinux3x:dev
  stage: build

  script:
    # Dependencias necesarias para construir paquetes Debian
    - apt-get update
    - apt-get install -y python3 python3-venv python3-dev build-essential devscripts debhelper

    # Crear usuario de build
    - useradd -m $_USER

    # Dar permisos del workspace al usuario
    - chown -R $_USER:$_USER .

    # Ejecutar la build como usuario normal SIN cambiar de directorio
    - su -s /bin/bash $_USER -c "dpkg-buildpackage -us -uc"

    # Recuperar los .deb generados (dpkg-buildpackage los deja en ..)
    - mv ../*.deb .

  artifacts:
    expire_in: 1 day
    paths:
      - ./*.deb

  only:
    - tags

